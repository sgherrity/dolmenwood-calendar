<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1872, height=702, initial-scale=1">
<title>Dolmenwood Calendar — TRMNL</title>
<style>
:root {
  --white: #ffffff;
  --black: #000000;
  --grey: #7d7d7d; /* 125,125,125 */
}
* { box-sizing: border-box; }
html, body {
  width: 1872px;
  height: 702px;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: var(--white);
  color: var(--black);
}
body {
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.3;
  font-weight: 600;
}

.screen {
  width: 1872px;
  height: 702px;
  display: flex;
  flex-direction: row;
  align-items: stretch;
  padding: 30px 36px;
}

/* ── Left column: Today card ── */
.today-col {
  flex: 0 0 1100px;
  display: flex;
  flex-direction: column;
  padding-right: 36px;
  border-right: 2px solid var(--grey);
  min-width: 0;
}
.today-card {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* ── Right column: current month ── */
.month-col {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  padding-left: 36px;
  min-width: 0;
}

/* Zone 1: Date */
.today-weekday {
  font-size: 20px;
  letter-spacing: 0.1em;
  color: var(--grey);
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 2px;
}
.today-bigdate {
  font-size: 72px;
  line-height: 1.02;
  font-weight: 800;
  color: var(--black);
  margin: 0;
  letter-spacing: -0.01em;
}
.today-season {
  font-size: 20px;
  color: var(--grey);
  font-weight: 700;
  margin: 4px 0 0;
}

/* Zone 2: Special day */
.today-special {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 2px solid var(--grey);
}
.today-feasts, .today-events {
  font-size: 24px;
  font-weight: 800;
  color: var(--black);
  margin: 0;
}
.today-events { margin-top: 4px; }
.feast-detail {
  font-size: 16px;
  font-weight: 600;
  color: var(--black);
  margin: 8px 0 0;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.feast-detail strong { font-weight: 800; }

/* Miracle */
.miracle-card {
  margin-top: 10px;
  padding-top: 10px;
}
.miracle-spell {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  margin: 0;
  line-height: 1.35;
}

/* Zone 3: Weather / Unseasons */
.today-weather-zone {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 2px solid var(--grey);
}
.today-weather {
  font-size: 22px;
  font-weight: 700;
  color: var(--black);
  margin: 0;
}
.today-weather-impacts {
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.today-weather-impact {
  font-size: 16px;
  font-weight: 600;
  color: var(--black);
}
.unseason-block { margin-bottom: 8px; }
.unseason-block:last-child { margin-bottom: 0; }
.unseason-name {
  font-size: 22px;
  font-weight: 800;
  color: var(--black);
  margin-bottom: 2px;
}
.unseason-nature {
  font-size: 16px;
  font-weight: 600;
  color: var(--black);
  line-height: 1.35;
  margin-bottom: 2px;
}
.unseason-effects {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.3;
}

/* Zone 4: Reference row */
.today-reference {
  margin-top: auto;
  padding-top: 12px;
  border-top: 2px solid var(--grey);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 20px;
}
.today-ref-item {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.today-ref-divider {
  color: var(--grey);
  font-size: 16px;
  font-weight: 700;
}

/* ── Month card (right column) ── */
.month-name {
  font-size: 30px;
  font-weight: 800;
  color: var(--black);
  margin: 0;
}
.month-meta {
  font-size: 18px;
  font-weight: 700;
  color: var(--grey);
  margin-bottom: 10px;
  border-bottom: 2px solid var(--grey);
  padding-bottom: 8px;
}
.weekday-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 4px;
}
.weekday-header div {
  font-size: 16px;
  font-weight: 700;
  color: var(--grey);
  text-align: center;
}
.day-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.day-cell {
  aspect-ratio: 1 / 1;
  background: var(--white);
  border: 2px solid var(--grey);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  border-radius: 2px;
}
.day-cell .num { line-height: 1; }
.day-cell.today {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
}
/* Unseason days — grey fill, black text/border for legibility */
.day-cell.unseason {
  background: var(--grey);
  border-color: var(--black);
  color: var(--black);
}
.day-cell.today.unseason {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
}
/* Feast marker: top-right star */
.day-cell.feast::after {
  content: "\2726";
  position: absolute;
  top: 1px; right: 3px;
  font-size: 16px;
  color: var(--black);
  line-height: 1;
}
.day-cell.today.feast::after { color: var(--white); }
/* Equinox/solstice: bottom bar */
.day-cell.event::before {
  content: "";
  position: absolute;
  bottom: 2px; left: 4px; right: 4px;
  height: 3px;
  background: var(--black);
  border-radius: 1px;
}
.day-cell.today.event::before { background: var(--white); }

/* Moon markers in day cells */
.moon-marker {
  position: absolute;
  top: 2px;
  left: 3px;
  line-height: 1;
  display: flex;
  align-items: center;
}
.moon-marker svg { display: block; }

/* Wysendays */
.wysenday-row {
  margin-top: 3px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 3px;
}
.wysenday-cell {
  min-height: 60px;
  background: var(--white);
  border: 2px solid var(--grey);
  border-radius: 2px;
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  display: flex;
  align-items: center;
  padding: 6px 10px;
  gap: 10px;
  line-height: 1.2;
  position: relative;
}
.wysenday-cell .wysen-num {
  font-size: 18px;
  font-weight: 800;
  color: var(--black);
  flex-shrink: 0;
}
.wysenday-cell .wysen-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
}
.wysenday-cell.today {
  background: var(--black);
  color: var(--white);
  border-color: var(--black);
}
.wysenday-cell.today .wysen-num,
.wysenday-cell.today .wysen-name { color: var(--white); }
.wysenday-cell.unseason {
  background: var(--grey);
  border-color: var(--black);
}
.wysenday-cell.today.unseason {
  background: var(--black);
  border-color: var(--black);
}
</style>
</head>
<body>
<div class="screen">
  <div class="today-col">
    <div class="card today-card" id="today-card"></div>
  </div>
  <div class="month-col" id="month-col"></div>
</div>

const DAYS_PER_YEAR = MONTHS.reduce((a, m) => a + m.len, 0); // = 352

const FEASTS = {

  '3:30': { feast: 'Feast of St Lillibeth of the sugared breath', note: "Pluritine Observances: Folk fashion or buy folded paper doves on which they write their afflictions. These are offered in supplication in hope that St. Lillibeth will intervene to cure them." },
  '4:1':  { feast: 'Feast of St Gwigh the unsleeping' },
  '4:2':  { feast: 'The Feast of Cats', note: "Folk Observances: All over Dolmenwood, the folk put on spring balls and light bonfires. They attend dressed as cats and accompany their revelry with screeching and discordant fiddle music." },

  '4:12': { feast: 'Feast of St Pious the plump' },

  '4:18': { feast: 'Feast of St Goodenough the hearty', note: "Pluritine Observances: Folk bring their corn dollies, saved from the previous harvest, to plow into the first furrows. In most settlements, folk build an imitation of such a dolly to burn in effigy." },
  '4:20': { event: 'Vernal Equinox', note: "Folk Observances: Folk flock to the hillsides to watch and participate in racing cheese wheels. They cap off the day with dances and drink." },

  '5:22': { feast: 'Feast of St Abthius, ever-lustrous', note: "Pluritine Observances: Folk adorn their homes and churches in the radiant colors of the new blooms to ward off late frosts, then hold courtly dances in the settlement squares." },

  '6:30': { feast: 'Feast of St Waylaine of the sack', note: "Pluritine Observances: The largest observance is in Prigwort. Throughout the Wood, folk enjoy a pageant wherein the eponymous saint is to be executed for treason, but is thrice spared by various contrivances." },
  '7:6':  { feast: 'Feast of St Nuncy the wretched' },
  '7:10': { feast: 'Feast of St Apoplect the ever-roaming' },

  '11:7':  { feast: 'Feast of St Horace the puissant', note: "Pluritine Observances: Folk around the Wood observe this feast by gathering and stringing up mushroom \"rosaries\". Popular dishes during this time all include the various mushrooms that grow in Dolmenwood." },
  '11:9':  { feast: 'Feast of St Hamfast, cloud-head', note: "Pluritine Observances: Folk construct, repair, and gather at wild \"churches\" made for the animals of the Wood. There they leave treats and other enticements to bring animals closer to the faith." },

// Anchor: real-world Feb 26 2026 = Dolmenwood 9/7/1089
const ANCHOR_REAL = new Date(Date.UTC(2026, 1, 26));
const ANCHOR_DW = { year: 1089, month: 9, day: 7 };

function dwSerial(year, month, day) {
  let serial = year * DAYS_PER_YEAR;
  for (let i = 0; i < month - 1; i++) serial += MONTHS[i].len;
  serial += (day - 1);
  return serial;
}
const ANCHOR_DW_SERIAL = dwSerial(ANCHOR_DW.year, ANCHOR_DW.month, ANCHOR_DW.day);

function serialToDw(serial) {
  let year = Math.floor(serial / DAYS_PER_YEAR);
  let rem = serial - year * DAYS_PER_YEAR;
  if (rem < 0) { year -= 1; rem += DAYS_PER_YEAR; }
  for (let i = 0; i < MONTHS.length; i++) {
    if (rem < MONTHS[i].len) return { year, month: i + 1, day: rem + 1 };
    rem -= MONTHS[i].len;
  }
  return { year, month: 12, day: MONTHS[11].len };
}

function realDayDiff(a, b) {
  const MS_PER_DAY = 86400000;
  const aMid = Date.UTC(a.getUTCFullYear(), a.getUTCMonth(), a.getUTCDate());
  const bMid = Date.UTC(b.getUTCFullYear(), b.getUTCMonth(), b.getUTCDate());
  return Math.round((aMid - bMid) / MS_PER_DAY);
}

function realToDw(realDate) {
  const diff = realDayDiff(realDate, ANCHOR_REAL);
  return serialToDw(ANCHOR_DW_SERIAL + diff);
}

function weekdayOf(month, day) {
  if (day > 28) return null;
  return WEEKDAYS[(day - 1) % 7];
}

function wysendayName(month, day) {
  if (day <= 28) return null;
  const m = MONTHS[month - 1];
  return m.wysendays[day - 29] || null;
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// ============================================================================
// SEEDED PRNG — mulberry32
// Weather seed is fixed for this static display (no reroll UI).
// ============================================================================
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const weatherSalt = parseInt('10C9KRB', 36);

// ============================================================================
// UNSEASON TRIGGER FUNCTIONS
// ============================================================================
function isHitching(dw) {
  if (dw.month !== 1 || dw.day > 20) return false;
  const triggerYear = dw.year - 1;
  const seed = (triggerYear * 100000 + 1230) ^ (weatherSalt * 2654435761);
  const rng = mulberry32(seed >>> 0);
  return rng() < 0.25;
}

function isVague(dw) {
  if (dw.month !== 2 && dw.month !== 3) return false;
  const checkPoints = [];
  for (const m of [2, 3]) {
    for (const d of [1, 8, 15, 22]) {
      if (m < dw.month || (m === dw.month && d <= dw.day)) {
        checkPoints.push({ month: m, day: d });
      }
    }
  }
  for (const cp of checkPoints) {
    const seed = (dw.year * 100000 + cp.month * 1000 + cp.day) ^ (weatherSalt * 2654435761);
    const rng = mulberry32(seed >>> 0);
    const triggered = rng() < 0.10;
    if (triggered) {
      const duration = Math.floor(rng() * 6) + 1;
      const cpAbs = (cp.month === 2 ? 0 : MONTHS[1].len) + (cp.day - 1);
      const dwAbs = (dw.month === 2 ? 0 : MONTHS[1].len) + (dw.day - 1);
      if (dwAbs <= cpAbs + duration - 1) return true;
    }
  }
  return false;
}

function isColliggwyld(dw) {
  if (dw.month !== 6) return false;
  const seed = (dw.year * 100000 + 601) ^ (weatherSalt * 2654435761);
  const rng = mulberry32(seed >>> 0);
  return rng() < 0.25;
}

function isChame(dw) {
  if (dw.month !== 9) return false;
  for (let d = 1; d <= 5; d++) {
    const seed = (dw.year * 100000 + 900 + d) ^ (weatherSalt * 2654435761);
    const rng = mulberry32(seed >>> 0);
    const triggered = rng() < 0.05;
    if (triggered) {
      const die1 = Math.floor(rng() * 10) + 1;
      const die2 = Math.floor(rng() * 10) + 1;
      const duration = die1 + die2;
      if (dw.day >= d && dw.day <= d + duration - 1) return true;
      return false;
    }
  }
  return false;
}

function getWeatherTable(dw) {
  if (isHitching(dw)) return WEATHER.hitching;
  if (isVague(dw))    return WEATHER.vague;
  if (dw.month <= 3)  return WEATHER.winter;
  if (dw.month <= 6)  return WEATHER.spring;
  if (dw.month <= 9)  return WEATHER.summer;
  return WEATHER.autumn;
}

function weatherRoll(dw) {
  const seed = (dw.year * 10000 + dw.month * 100 + dw.day) ^ (weatherSalt * 2654435761);
  const rng = mulberry32(seed >>> 0);
  const d1 = Math.floor(rng() * 6) + 1;
  const d2 = Math.floor(rng() * 6) + 1;
  return d1 + d2;
}

function getWeather(dw) {
  const table = getWeatherTable(dw);
  const roll  = weatherRoll(dw);
  return table[roll];
}

function moonPhaseOf(month, day) {
  let absDay = 0;
  for (let i = 0; i < month - 1; i++) absDay += MONTHS[i].len;
  absDay += (day - 1);
  const daysSinceNewMoon = absDay - MOON_ANCHOR_DAY_OF_YEAR;
  const pos = ((daysSinceNewMoon % LUNAR_CYCLE) + LUNAR_CYCLE) % LUNAR_CYCLE;
  return pos / LUNAR_CYCLE;
}

function moonName(phase) {
  if (phase < 0.03 || phase > 0.97) return 'New Moon';
  if (phase < 0.22) return 'Waxing Crescent';
  if (phase < 0.28) return 'First Quarter';
  if (phase < 0.47) return 'Waxing Gibbous';
  if (phase < 0.53) return 'Full Moon';
  if (phase < 0.72) return 'Waning Gibbous';
  if (phase < 0.78) return 'Last Quarter';
  return 'Waning Crescent';
}

// Large moon icon for the today card — black/white only
function moonIcon(phase) {
  const r = 8, cx = 9, cy = 9;
  if (phase < 0.03 || phase > 0.97) {
    return `<svg width="18" height="18" viewBox="0 0 18 18"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#000000" stroke="#000000"/></svg>`;
  }
  if (phase > 0.47 && phase < 0.53) {
    return `<svg width="18" height="18" viewBox="0 0 18 18"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#ffffff" stroke="#000000" stroke-width="2"/></svg>`;
  }
  const isWaxing = phase < 0.5;
  const litFrac = (phase < 0.5) ? phase * 2 : (1 - phase) * 2;
  const ellipseRx = r * (1 - 2 * litFrac);
  const litSide = isWaxing
    ? 'M ' + (cx) + ' ' + (cy - r) + ' A ' + r + ' ' + r + ' 0 0 1 ' + cx + ' ' + (cy + r) + ' A ' + Math.abs(ellipseRx) + ' ' + r + ' 0 0 ' + (ellipseRx > 0 ? 0 : 1) + ' ' + cx + ' ' + (cy - r) + ' Z'
    : 'M ' + (cx) + ' ' + (cy - r) + ' A ' + r + ' ' + r + ' 0 0 0 ' + cx + ' ' + (cy + r) + ' A ' + Math.abs(ellipseRx) + ' ' + r + ' 0 0 ' + (ellipseRx > 0 ? 1 : 0) + ' ' + cx + ' ' + (cy - r) + ' Z';
  return `<svg width="18" height="18" viewBox="0 0 18 18"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#000000" stroke="#000000"/><path d="${litSide}" fill="#ffffff"/></svg>`;
}

// Small moon marker for calendar day cells (new/full moon only)
function moonMarker(month, day) {
  let absDay = 0;
  for (let i = 0; i < month - 1; i++) absDay += MONTHS[i].len;
  absDay += (day - 1);
  const pos = ((absDay - MOON_ANCHOR_DAY_OF_YEAR) % LUNAR_CYCLE + LUNAR_CYCLE) % LUNAR_CYCLE;
  if (pos < 1.0) {
    return `<span class="moon-marker"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="#000000" stroke="#000000"/></svg></span>`;
  }
  const posFull = (pos - LUNAR_CYCLE / 2 + LUNAR_CYCLE) % LUNAR_CYCLE;
  if (posFull < 1.0) {
    return `<span class="moon-marker"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="#ffffff" stroke="#000000" stroke-width="1.5"/></svg></span>`;
  }
  return '';
}

function feastFor(month, day) {
  return FEASTS[month + ':' + day] || null;
}

function renderTodayCard(dw, realDate) {
  const m = MONTHS[dw.month - 1];
  const wkd = weekdayOf(dw.month, dw.day);
  const wy = wysendayName(dw.month, dw.day);
  const phase = moonPhaseOf(dw.month, dw.day);
  const moonNm = moonName(phase);
  const feast = feastFor(dw.month, dw.day);
  const unseasons = getActiveUnseasons(dw);
  const hasUnseason = unseasons.length > 0;

  let html = '';

  // Zone 1: Date
  html += `<div>`;
  if (wy) {
    html += `<div class="today-weekday">\u2014 Wysenday \u2014</div>`;
  } else {
    html += `<div class="today-weekday">${wkd.toUpperCase()}</div>`;
  }
  const dayLabel = wy ? wy : `${ordinal(dw.day)} of ${m.name}`;
  html += `<div class="today-bigdate">${dayLabel}</div>`;
  html += `<div class="today-season">${ordinal(m.ord)} Month \u00b7 Year ${dw.year}</div>`;
  html += `</div>`;

  // Zone 2: Special day
  if (feast && (feast.feast || feast.event)) {
    html += `<div class="today-special">`;
    if (feast.feast) html += `<div class="today-feasts">\u2726 ${feast.feast}</div>`;
    if (feast.event) html += `<div class="today-events">\u2609 ${feast.event}</div>`;
    if (feast.note)  html += `<div class="feast-detail">${feast.note.replace(/(Pluritine Observances:.*?)(Folk Observances:)/g, '$1<br>$2')}</div>`;
    html += `</div>`;
  }

  // Miracle (conditional)
  const miracleKey = `${dw.month}:${dw.day}`;
  const miracle = MIRACLES[miracleKey];
  if (miracle) {
    html += `<div class="miracle-card">`;
    html += `<div class="miracle-spell">${miracle.spell} \u2014 ${miracle.prayer}${miracle.page ? ' (p. ' + miracle.page + ')' : ''}</div>`;
    html += `</div>`;
  }

  // Zone 3: Weather & Unseasons
  const wx = getWeather(dw);
  html += `<div class="today-weather-zone">`;
  if (hasUnseason) {
    for (const u of unseasons) {
      html += `<div class="unseason-block">`;
      html += `<div class="unseason-name">${u.name}</div>`;
      html += `<div class="unseason-nature">${u.nature}</div>`;
      html += `<div class="unseason-effects">${u.effects}</div>`;
      html += `</div>`;
    }
    html += `<div class="today-weather" style="margin-top:8px;">${wx.text}</div>`;
    const uImpacts = [];
    if (wx.I) uImpacts.push('Travel impeded \u2014 daily Travel Points reduced by 2');
    if (wx.V) uImpacts.push('Poor visibility \u2014 encounter distance halved, +1-in-6 chance of getting lost');
    if (wx.W) uImpacts.push('Wet conditions \u2014 building a campfire is difficult');
    if (uImpacts.length) {
      html += `<div class="today-weather-impacts">`;
      for (const imp of uImpacts) html += `<div class="today-weather-impact">${imp}</div>`;
      html += `</div>`;
    }
  } else {
    html += `<div class="today-weather">${m.season} \u00b7 ${wx.text}</div>`;
    const impacts = [];
    if (wx.I) impacts.push('Travel impeded \u2014 daily Travel Points reduced by 2');
    if (wx.V) impacts.push('Poor visibility \u2014 encounter distance halved, +1-in-6 chance of getting lost');
    if (wx.W) impacts.push('Wet conditions \u2014 building a campfire is difficult');
    if (impacts.length) {
      html += `<div class="today-weather-impacts">`;
      for (const imp of impacts) html += `<div class="today-weather-impact">${imp}</div>`;
      html += `</div>`;
    }
  }
  html += `</div>`;

  // Zone 4: Reference info
  const sun = SUN_TIMES[dw.month];
  const sunSvgRise = `<svg width="14" height="14" viewBox="0 0 13 13" style="flex-shrink:0"><circle cx="6.5" cy="6.5" r="3" fill="#000000" stroke="none"/><g stroke="#000000" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="0.5" x2="6.5" y2="2.2"/><line x1="6.5" y1="10.8" x2="6.5" y2="12.5"/><line x1="0.5" y1="6.5" x2="2.2" y2="6.5"/><line x1="10.8" y1="6.5" x2="12.5" y2="6.5"/><line x1="2.1" y1="2.1" x2="3.3" y2="3.3"/><line x1="9.7" y1="9.7" x2="10.9" y2="10.9"/><line x1="10.9" y1="2.1" x2="9.7" y2="3.3"/><line x1="3.3" y1="9.7" x2="2.1" y2="10.9"/></g></svg>`;
  const sunSvgSet  = `<svg width="14" height="14" viewBox="0 0 13 13" style="flex-shrink:0"><circle cx="6.5" cy="6.5" r="3" fill="#7d7d7d" stroke="none"/><g stroke="#7d7d7d" stroke-width="1.4" stroke-linecap="round"><line x1="6.5" y1="0.5" x2="6.5" y2="2.2"/><line x1="6.5" y1="10.8" x2="6.5" y2="12.5"/><line x1="0.5" y1="6.5" x2="2.2" y2="6.5"/><line x1="10.8" y1="6.5" x2="12.5" y2="6.5"/><line x1="2.1" y1="2.1" x2="3.3" y2="3.3"/><line x1="9.7" y1="9.7" x2="10.9" y2="10.9"/><line x1="10.9" y1="2.1" x2="9.7" y2="3.3"/><line x1="3.3" y1="9.7" x2="2.1" y2="10.9"/></g></svg>`;

  const realLabel = realDate.toUTCString().slice(0, 16).toUpperCase();

  html += `<div class="today-reference">`;
  html += `<span class="today-ref-item">${realLabel}</span>`;
  html += `<span class="today-ref-divider">&middot;</span>`;
  html += `<span class="today-ref-item">${moonIcon(phase)} ${moonNm.toUpperCase()}</span>`;
  html += `<span class="today-ref-divider">&middot;</span>`;
  html += `<span class="today-ref-item">${sunSvgRise} ${sun.rise}</span>`;
  html += `<span class="today-ref-divider">&middot;</span>`;
  html += `<span class="today-ref-item">${sunSvgSet} ${sun.set}</span>`;
  html += `<span class="today-ref-divider">&middot;</span>`;
  html += `<span class="today-ref-item">${sun.daylight} daylight</span>`;
  html += `</div>`;

  document.getElementById('today-card').innerHTML = html;
}

// ============================================================================
// RENDER: CURRENT MONTH (right column)
// ============================================================================
function renderMonthCol(dw) {
  const out = document.getElementById('month-col');
  const m = MONTHS[dw.month - 1];
  let html = '';
  html += `<div class="month-name">${m.name}</div>`;
  html += `<div class="month-meta">${m.season} &middot; ${ordinal(m.ord)} Month</div>`;

  html += `<div class="weekday-header">`;
  for (const w of WEEKDAYS) html += `<div>${w.slice(0, 3).toUpperCase()}</div>`;
  html += `</div>`;

  html += `<div class="day-grid">`;
  for (let day = 1; day <= 28; day++) {
    const f = feastFor(m.ord, day);
    const isToday = (day === dw.day);
    const cellDw = { year: dw.year, month: m.ord, day: day };
    const classes = ['day-cell'];
    if (getActiveUnseasons(cellDw).length > 0) classes.push('unseason');
    if (isToday) classes.push('today');
    if (f && f.feast) classes.push('feast');
    if (f && f.event) classes.push('event');
    const marker = moonMarker(m.ord, day);
    html += `<div class="${classes.join(' ')}">${marker}<div class="num">${day}</div></div>`;
  }
  html += `</div>`;

  if (m.len > 28) {
    html += `<div class="wysenday-row">`;
    for (let day = 29; day <= m.len; day++) {
      const wy = wysendayName(m.ord, day);
      const f = feastFor(m.ord, day);
      const isToday = (day === dw.day);
      const cellDw = { year: dw.year, month: m.ord, day: day };
      const classes = ['wysenday-cell'];
      if (getActiveUnseasons(cellDw).length > 0) classes.push('unseason');
      if (isToday) classes.push('today');
      let extra = '';
      if (f && f.feast) extra = ' \u2726';
      const marker = moonMarker(m.ord, day);
      const wysenCount = m.len - 28;
      const wysenIndex = day - 29;
      const isLastOdd = (wysenCount % 2 === 1) && (wysenIndex === wysenCount - 1);
      const style = isLastOdd ? ' style="grid-column: 1 / -1;"' : '';
      html += `<div class="${classes.join(' ')}"${style}>${marker}<span class="wysen-num">${day}</span><span class="wysen-name">${wy || ''}${extra}</span></div>`;
    }
    html += `</div>`;
  }

  out.innerHTML = html;
}

// ============================================================================
// INIT
// ============================================================================
window.addEventListener('DOMContentLoaded', () => {
  const realDate = new Date();
  const dw = realToDw(realDate);
  renderTodayCard(dw, realDate);
  renderMonthCol(dw);
});
</script>
